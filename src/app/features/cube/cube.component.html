<!-- PLACEHOLDER -->
<div class="rubik-cube">
  <div class="face front">
    <div class="square red"></div>
    <div class="square green"></div>
    <div class="square blue"></div>
    <div class="square yellow"></div>
    <div class="square orange"></div>
    <div class="square white"></div>
    <div class="square green"></div>
    <div class="square yellow"></div>
    <div class="square orange"></div>
  </div>
  <div class="face back">
    <div class="square blue"></div>
    <div class="square green"></div>
    <div class="square yellow"></div>
    <div class="square red"></div>
    <div class="square orange"></div>
    <div class="square white"></div>
    <div class="square yellow"></div>
    <div class="square orange"></div>
    <div class="square blue"></div>
  </div>
  <div class="face left">
    <div class="square yellow"></div>
    <div class="square red"></div>
    <div class="square blue"></div>
    <div class="square white"></div>
    <div class="square green"></div>
    <div class="square orange"></div>
    <div class="square red"></div>
    <div class="square green"></div>
    <div class="square yellow"></div>
  </div>
  <div class="face right">
    <div class="square blue"></div>
    <div class="square green"></div>
    <div class="square yellow"></div>
    <div class="square orange"></div>
    <div class="square red"></div>
    <div class="square white"></div>
    <div class="square green"></div>
    <div class="square orange"></div>
    <div class="square blue"></div>
  </div>
  <div class="face top">
    <div class="square red"></div>
    <div class="square green"></div>
    <div class="square blue"></div>
    <div class="square yellow"></div>
    <div class="square orange"></div>
    <div class="square white"></div>
    <div class="square yellow"></div>
    <div class="square green"></div>
    <div class="square orange"></div>
  </div>
  <div class="face bottom">
    <div class="square green"></div>
    <div class="square yellow"></div>
    <div class="square red"></div>
    <div class="square blue"></div>
    <div class="square white"></div>
    <div class="square orange"></div>
    <div class="square red"></div>
    <div class="square orange"></div>
    <div class="square blue"></div>
  </div>
</div>

<div class="controls">
  <button mat-raised-button id="connect">Connect</button>
  <button mat-raised-button id="reset-state">Reset State</button>
  <button mat-raised-button id="reset-gyro">Reset Gyro</button>
</div>
